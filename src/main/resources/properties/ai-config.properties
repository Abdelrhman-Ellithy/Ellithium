# Ellithium AI Engine Configuration

# Healing strategy: DISABLED | HEAL_AND_CONTINUE | HEAL_AND_NOTIFY
ai.healing.strategy=HEAL_AND_NOTIFY

# Tier 2 (local model) accept threshold — minimum combined score to use a local heal.
ai.onnx.similarityThreshold=0.60

# Tier 3 (LLM) accept threshold — minimum confidence to use an LLM-suggested locator.
ai.healing.confidenceThreshold=0.70

# A heal scoring below this is used for the current action but never persisted (baseline / source patch).
ai.healing.storeThreshold=0.70

# Stored fingerprints older than this many days are evicted on load (0 disables).
ai.healing.baselineTtlDays=30

# LLM provider
ai.llm.provider=Gemini
ai.llm.apiKey=${GEMINI_API_KEY}
ai.llm.model=gemini-3-flash-preview
ai.llm.baseUrl=https://generativelanguage.googleapis.com/v1beta/

# Execution mode: LOCAL (patch source files) | CI (report only, never writes source)
ai.execution.mode=LOCAL

# Send screenshots to the LLM for visual healing (set false for PII compliance).
ai.vision.allowMobile=true
ai.vision.allowWeb=true

# Vision RCA: when true, AIVisionRCA sends a screenshot of a failed test to the LLM
# and attaches a root-cause analysis to the Allure report.
# Requires a vision-capable provider (Gemini, GPT-4o, Claude) and ai.vision.allowWeb=true.
ai.vision.rca.enabled=false