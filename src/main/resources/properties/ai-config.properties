# Ellithium AI Engine Configuration

# Healing strategy: DISABLED | HEAL_AND_CONTINUE | HEAL_AND_NOTIFY
ai.healing.strategy=HEAL_AND_NOTIFY

# Minimum AI confidence required to apply a fix.
ai.healing.confidenceThreshold=0.70

# A heal below storeThreshold is used for the action but not persisted.
ai.healing.storeThreshold=0.75

# Stored fingerprints older than this many days are evicted on load (0 disables). Stops an
# intentional rename from healing back to the old element forever.
ai.healing.baselineTtlDays=30

# Number of locator candidates the LLM should return.
ai.healing.maxCandidates=3

# LLM provider
ai.llm.provider=Gemini
ai.llm.apiKey=${GEMINI_API_KEY}
ai.llm.model=gemini-3-flash-preview
ai.llm.baseUrl=https://generativelanguage.googleapis.com/v1beta/

# Execution mode: LOCAL | CI
ai.execution.mode=LOCAL

# Vision RCA
ai.vision.rca.enabled=false

# Send mobile (Appium) screenshots to the cloud LLM for visual healing. Default false — mobile
# screens often render PII. Web vision is always allowed.
ai.vision.allowMobile=false

# Tier 3 license key (blank disables Tier 3).
ai.license.key=

# Tier 3 similarity thresholds and candidate caps.
ai.onnx.similarityThreshold=0.75
ai.onnx.similarityThreshold.readable=0.75
ai.onnx.maxCandidates=10
ai.onnx.maxCandidates.readable=50

# Hard cap on candidates collected from the DOM (heavy pages can return thousands).
ai.onnx.hardCandidateLimit=300

# Strategy-rescue gate: accept a heal when a gold-tier Tier-2 strategy match (exact data-testid /
# AppiumBy) is corroborated by the baseline fingerprint, even if the bi-encoder cosine is below the
# similarity threshold. Two independent high-precision signals — the bridge that lets mandatory
# Tier 2 heal (and mobile heal before the model is retrained). fingerprintFloor = required f1.
ai.ensemble.gate.strategyRescue=true
ai.ensemble.gate.fingerprintFloor=0.70