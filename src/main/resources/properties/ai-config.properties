# Ellithium AI Engine Configuration
# -----------------------------------

# Healing Strategy options:
# DISABLED - No self-healing occurs
# HEAL_AND_CONTINUE - AI heals locator, executes it, and continues test
# HEAL_AND_NOTIFY - AI heals locator, executes it, continues, and updates the source code (Requires LOCAL mode)
ai.healing.strategy=HEAL_AND_NOTIFY

# Confidence Threshold: Minimum AI confidence (0.0 to 1.0) required to apply a fix
ai.healing.confidenceThreshold=0.70

# Store Threshold: the HIGH-confidence bar a heal must clear to be PERSISTED — i.e. promoted to a
# stored baseline AND written into the .java source. A heal below this bar is still used for the
# current action (so the test can proceed) but is NOT persisted, so a low-confidence guess can never
# poison the baseline store or rewrite source with a wrong locator. Conflicting patches for the same
# field keep the higher-confidence result (Tier 4 LLM > Tier 3 ONNX > Tier 1 algorithmic).
ai.healing.storeThreshold=0.85

# Max Candidates: Number of locator candidates the LLM should return (3-5 recommended)
ai.healing.maxCandidates=3

# LLM Provider Configuration
ai.llm.provider=Gemini
ai.llm.apiKey=${GEMINI_API_KEY}
ai.llm.model=gemini-3-flash-preview
ai.llm.baseUrl=https://generativelanguage.googleapis.com/v1beta/

# Execution mode:
# LOCAL - Directly modifies Java Page Object Model files on disk
# CI - Queues changes and generates a markdown report (healing-report.md) at suite end
ai.execution.mode=LOCAL

# Vision RCA:
# true - Sends failure screenshots to vision-capable models for Root Cause Analysis
# false - Disables visual RCA
ai.vision.rca.enabled=false

# ── Tier 3: Local ONNX Embedding (Paid Feature) ──────────────────────────────────────
# License key for Tier 3 local embedding model (issued by Ellithium licensing server).
# Leave blank to disable Tier 3 (Tier 4 LLM remains active).
ai.license.key=

# Pooling for the Tier 3 embedding model — MUST match how the embedded model was trained/exported.
# "cls"  → BGE family (bge-small-en-v1.5 uses the [CLS] token)   [default]
# "mean" → MiniLM-style models (mean over tokens)
# If healing picks obviously wrong elements (e.g. a password field over the only Login button),
# the pooling likely doesn't match the model — flip this and re-run to A/B test (no retrain needed).
ai.onnx.pooling=mean

# Cosine similarity threshold for Tier 3 ONNX embedding match acceptance (0.0–1.0).
# Run ModelCalibrationRunner after any model sw
ap to recalibrate this value.
ai.onnx.similarityThreshold=0.30

# Lower threshold for READABLE actions (getText). Text-heavy elements (product titles,
# prices) score lower with bi-encoders than structured inputs — a relaxed threshold
# is calibrated separately to avoid always falling through to Tier 4.
ai.onnx.similarityThreshold.readable=0.30

# Maximum number of DOM element candidates to embed and score per heal attempt.
ai.onnx.maxCandidates=10

# Wider candidate pool for READABLE healing — text-bearing elements appear later in the
# DOM than interactive elements so a larger limit is needed to reach product titles, prices, etc.
ai.onnx.maxCandidates.readable=50