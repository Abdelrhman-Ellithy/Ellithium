# =============================================================================
# Ellithium AI Engine Configuration
# All keys are optional; omitting a key uses the code default shown in comments.
# =============================================================================

# =============================================================================
# HEALING STRATEGY
# =============================================================================

# Controls what the engine does after a successful heal.
#   DISABLED          — AI healing completely off; no tiers are invoked.
#   HEAL_AND_CONTINUE — Heal silently and continue the test.
#   HEAL_AND_NOTIFY   — Heal and log a warning with the healed locator.
#   SUGGEST_ONLY      — Log the suggestion but do not apply it; skips DOM/screenshot capture.
# Default: DISABLED
ai.healing.strategy=HEAL_AND_NOTIFY

# Maximum number of candidates the LLM (Tier 3) is asked to return in its JSON
# response. Higher values give more fallback options at the cost of slightly
# larger responses. Capped at 10.
# Default: 3
ai.healing.maxCandidates=3

# Minimum combined score (fingerprint + strategy + cosine signals fused) for
# Tier 2 to accept a heal candidate via the normal gate path.
# Default: 0.70
ai.onnx.similarityThreshold=0.70

# Minimum confidence the LLM must self-report on a candidate for Tier 3 to
# consider it. Candidates below this are skipped without attempting the locator.
# Default: 0.80
ai.healing.confidenceThreshold=0.80

# A healed locator scoring below this threshold is applied for the current
# action but never written to the baseline store or patched in source.
# Prevents low-confidence heals from poisoning future runs.
# Should be higher than ai.healing.confidenceThreshold.
# Default: 0.75
ai.healing.storeThreshold=0.75

# =============================================================================
# TIER 1 — BASELINE STORE
# =============================================================================

# Fingerprints older than this many days are evicted when the baseline file is loaded.
# Set 0 to disable TTL eviction.
# Default: 30
ai.healing.baselineTtlDays=30

# =============================================================================
# TIER 2 — LOCAL ONNX MODEL
# =============================================================================

# Maximum number of DOM candidates passed to the ONNX scorer per heal attempt.
# Larger values improve recall but increase inference time.
# Default: 15
ai.onnx.maxCandidates=15

# Hard upper bound on DOM candidate collection regardless of ai.onnx.maxCandidates.
# Protects against extremely large DOMs in SPAs.
# Default: 300
ai.onnx.hardCandidateLimit=300

# Confidence score assigned to a Tier 2 semantic heal when the broken locator
# has no stored baseline fingerprint (cold-start). Applied as a conservative
# fallback — the heal is used but not persisted unless it also clears
# ai.healing.storeThreshold.
# Default: 0.65
ai.healing.semanticFallbackScore=0.65

# After Tier 3 (LLM) suggests a locator and the framework resolves an element
# with it, this is the minimum fingerprint similarity that element must score
# against the stored baseline to be accepted. Only enforced when matchScore > 0;
# a score of exactly 0.0 (cold-start / fully redesigned element with no
# overlapping attributes) is always allowed through. Set 0.0 to skip this
# cross-validation entirely.
# Default: 0.40
ai.healing.tier3BaselineMatchFloor=0.40

# Number of ORT session objects to keep in the pool (one per concurrent thread).
# Leave unset to let the engine auto-size from available heap and CPU count.
# Each session consumes ~34 MB of native heap; size accordingly.
# Default: auto (min(availableProcessors, maxHeap/34MB, 8))
# ellithium.ai.onnxSessionPoolSize=4

# =============================================================================
# TIER 3 — LLM
# =============================================================================

# Set false to disable LLM (Tier 3) entirely while keeping Tier 1 and Tier 2 active.
# Default: true
ai.tier3.enabled=true

# LLM provider identifier. Supported built-ins: openai, gemini, claude, azure-openai.
# For a custom provider, leave this blank and set ai.llm.providerClass instead.
# Default: (empty — Tier 3 disabled until a provider is configured)
ai.llm.provider=Gemini

# API key for the chosen provider. Use an environment-variable placeholder to keep
# secrets out of version control. Never commit a raw key.
ai.llm.apiKey=${LLM_API_KEY}

# Model identifier as understood by the provider's API.
ai.llm.model=gemini-3.1-flash-lite

# Base URL for the provider's API endpoint. Required for self-hosted or Azure deployments.
ai.llm.baseUrl=https://generativelanguage.googleapis.com/v1beta/

# Fully-qualified class name of a custom LLMProvider implementation (optional).
# When set, ai.llm.provider is ignored.
# Default: (empty)
# ai.llm.providerClass=com.example.MyLLMProvider

# Maximum time in milliseconds to wait for a single LLM API response before timing out.
# LLMs routinely take 5–15 s; set this to at least 5000.
# Default: 15000
ai.llm.healMaxWaitMs=5000

# Number of LLM call attempts before giving up.
#   CI mode  (ai.execution.mode=CI) : always 1 attempt, never retried.
#   LOCAL mode                      : retried up to this many times with a fixed
#                                     300ms delay between attempts.
# Default: 3
ai.llm.maxRetries=3

# =============================================================================
# VISION
# =============================================================================

# Send screenshots to the LLM for visual healing on web browsers.
# IMPORTANT: screenshots expose whatever is visible on screen — disable in any
# environment handling personal data (healthcare, finance, HR) to comply with GDPR/HIPAA.
# Default: false
ai.vision.allowWeb=false

# Send screenshots to the LLM for visual healing on mobile (Appium) sessions.
# Same privacy considerations as ai.vision.allowWeb apply.
# Default: false
ai.vision.allowMobile=false

# Attach an AI-generated root-cause analysis screenshot to Allure on test failure.
# Requires a vision-capable provider and ai.vision.allowWeb=true.
# Default: false
ai.vision.rca.enabled=false

# =============================================================================
# LIVE IN-CONTEXT GENERATION
# =============================================================================

# Controls whether EllithiumAIEngine.continueFrom (live in-context execution) may
# follow an LLM-emitted "navigate" step to a URL on a DIFFERENT origin than the page
# the browser is currently on. The page content sent to the LLM is untrusted input,
# so a malicious page could attempt to steer navigation off-site (prompt injection)
# while the session is authenticated.
#   true  — allow any navigate target (general-purpose; current behaviour).
#   false — only allow navigation to the current origin (scheme + host + port);
#           cross-origin navigate steps are blocked and logged as an error.
# Default: true
ai.live.allowCrossOriginNavigate=true

# =============================================================================
# EXECUTION MODE
# =============================================================================

# Controls post-heal source file behaviour.
#   LOCAL — write healed locators directly back to source files (for local development).
#   CI    — never touch source; generate healing-report.md and telemetry only.
# Default: LOCAL
ai.execution.mode=LOCAL

# =============================================================================
# CI ALERTING
# =============================================================================

# When running in CI mode, write a [CI-HEAL-ALERT] ERROR log and a
# Test-Output/.healstatus file if the number of applied heals in this run
# reaches this threshold. Useful as a gate to block a PR when too many
# locators are silently broken. Set -1 (or omit) to disable.
# Default: -1 (disabled)
ai.healing.ciAlertThreshold=-1

# =============================================================================
# TELEMETRY
# =============================================================================

# Maximum number of telemetry records kept in memory per run.
# Oldest records are evicted (ring-buffer) once this limit is reached.
# Increase for very long suites; decrease to reduce heap usage.
# Default: 100000
ai.telemetry.maxRecords=100000