# Ellithium AI Engine Configuration
# -----------------------------------

# Healing Strategy options:
# DISABLED - No self-healing occurs
# HEAL_AND_CONTINUE - AI heals locator, executes it, and continues test
# HEAL_AND_NOTIFY - AI heals locator, executes it, continues, and updates the source code (Requires LOCAL mode)
ai.healing.strategy=HEAL_AND_NOTIFY

# Confidence Threshold: Minimum AI confidence (0.0 to 1.0) required to apply a fix
ai.healing.confidenceThreshold=0.85

# LLM Provider Configuration
ai.llm.provider=Gemini
ai.llm.apiKey=${GEMINI_API_KEY}
ai.llm.model=gemini-3.1-flash-lite
ai.llm.baseUrl=https://generativelanguage.googleapis.com/v1beta/

# Execution mode:
# LOCAL - Directly modifies Java Page Object Model files on disk
# CI - Queues changes and generates a markdown report (healing-report.md) at suite end
ai.execution.mode=LOCAL

# Vision RCA:
# true - Sends failure screenshots to vision-capable models for Root Cause Analysis
# false - Disables visual RCA
ai.vision.rca.enabled=false